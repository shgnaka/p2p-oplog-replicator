name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  governance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Validate governance files and policy
        run: scripts/ci/validate-governance.sh

  test-and-conformance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependency
        run: python -m pip install --upgrade pip cryptography

      - name: Run unit tests
        run: PYTHONPATH=src:. python -m unittest discover -s tests -p 'test_*.py' -v

      - name: Run conformance suite
        run: PYTHONPATH=src:. python tools/conformance/run_suite.py --output-dir artifacts/conformance

      - name: Upload conformance artifacts
        uses: actions/upload-artifact@v4
        with:
          name: conformance-artifacts
          path: artifacts/conformance
